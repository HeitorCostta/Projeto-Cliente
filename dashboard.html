<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="logo-container">
  <img src="./img/logo.jpeg" alt="Logo">
</div>

<h2>🌾 Sistema de Produtores</h2>

<div class="top-bar">
<button class="btn-primary" onclick="abrirModalCreate()">+ Novo Produtor</button>
<button class="btn-dark" onclick="logout()">Sair</button>
</div>

<div class="filtro">
  <input type="text" id="filtroNome" placeholder="Buscar por nome">
  <input type="text" id="filtroCidade" placeholder="Buscar por cidade">
</div>

<ul id="lista"></ul>

<!-- DETALHES -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="fecharModal()">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<!-- EDITAR PRODUTOR -->
<div id="modalEdit" class="modal">
  <div class="modal-content">
    <span class="close" onclick="fecharModalEdit()">&times;</span>

    <h3>Editar Produtor</h3>

    <form id="formEdit">
      <input type="text" id="editNome"><br><br>
      <input type="text" id="editCidade"><br><br>
      <input type="text" id="editEstado"><br><br>
      <input type="text" id="editTelefone"><br><br>
      <input type="email" id="editEmail"><br><br>

      <button type="submit">Salvar</button>
    </form>
  </div>
</div>

<div id="modalCreate" class="modal">
  <div class="modal-content">
    <span class="close" onclick="fecharModalCreate()">&times;</span>

    <h3>Novo Produtor</h3>

    <form id="formCreate">
      
      <input type="text" id="createNome" placeholder="Nome do Produtor" required><br><br>

      <input type="text" id="createCidade" placeholder="Cidade" required><br><br>

      <input type="text" id="createEstado" placeholder="Estado (UF)" required><br><br>

      <input type="text" id="createTelefone" placeholder="Telefone" maxlength="15"><br><br>

      <input type="email" id="createEmail" placeholder="Email"><br><br>

      <button type="submit">Cadastrar</button>
    </form>
  </div>
</div>

<div id="modalPropriedade" class="modal">
  <div class="modal-content">
    <span class="close" onclick="fecharModalPropriedade()">&times;</span>

    <h3>Nova Propriedade</h3>

    <form id="formPropriedade">

      <input type="text" id="propNome" placeholder="Nome da Propriedade" required><br><br>

      <input type="text" id="propCidade" placeholder="Cidade da Propriedade" required><br><br>

      <input type="text" id="propEstado" placeholder="Estado (UF)" required><br><br>

      <input type="number" id="propArea" placeholder="Tamanho da Área (hectares)" required><br><br>

      <input type="text" id="propCultura" placeholder="Cultura Principal (ex: soja, milho)" required><br><br>

      <textarea id="propObs" placeholder="Observações (opcional)"></textarea><br><br>

      <button type="submit">Cadastrar</button>
    </form>
  </div>
</div>

<!-- EDITAR PROPRIEDADE -->
<div id="modalEditProp" class="modal">
  <div class="modal-content">
    <span class="close" onclick="fecharModalEditProp()">&times;</span>

    <h3>Editar Propriedade</h3>

    <form id="formEditProp">
      <input type="text" id="editPropNome"><br><br>
      <input type="text" id="editPropCidade"><br><br>
      <input type="text" id="editPropEstado"><br><br>
      <input type="number" id="editPropArea"><br><br>
      <input type="text" id="editPropCultura"><br><br>
      <textarea id="editPropObs"></textarea><br><br>

      <button type="submit">Salvar</button>
    </form>
  </div>
</div>

<script src="./js/dashboard.js"></script>

</body>
</html>
